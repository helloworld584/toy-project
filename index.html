<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina v2: Supernova Masterpiece</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020205; font-family: 'Inter', sans-serif; }
        canvas { display: block; touch-action: none; cursor: crosshair; }
        .glass-panel {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 10px 50px 0 rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }
        input[type=range] { accent-color: #00f2ff; }
        #fps-monitor {
            position: fixed; top: 10px; left: 10px; font-family: monospace; font-size: 10px;
            color: #00ff00; background: rgba(0, 0, 0, 0.5); padding: 2px 6px; border-radius: 4px;
            pointer-events: none; z-index: 100; opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- 
    [MASTERPIECE ENGINEERING LOG]
    1. Precision Coordinate Mapping: getBoundingClientRect() + DPR compensation for 0% offset.
    2. Soft-Body Physics: 60px safety zone + Repulsion logic to prevent clustering.
    3. Silk Inertia: 50% reduced acceleration + 0.94 damping for fluid, organic motion.
    4. Supernova Explosion: Explicit mousedown event with explosive force & white-hot state.
    5. Spatial Partitioning (80x80 Grid): O(N) complexity for stable 60FPS.
    6. Real-time Control Panel: Dynamic parameter adjustment via Tailwind UI.
    -->
    <div id="fps-monitor">FPS: --</div>
    <canvas id="luminaCanvas"></canvas>

    <!-- UI Controller -->
    <div class="fixed bottom-8 right-8 w-80 glass-panel p-6 text-white select-none">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-black tracking-tighter bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                LUMINA V2
            </h2>
            <span class="text-[10px] px-2 py-1 rounded-full bg-cyan-500/20 text-cyan-400 font-bold border border-cyan-500/30 uppercase">Masterpiece</span>
        </div>
        
        <div class="space-y-4">
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2 tracking-widest opacity-60">
                    <span>PARTICLE COUNT</span>
                    <span id="countVal">200</span>
                </div>
                <input type="range" id="particleCount" min="50" max="400" value="200" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>

            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2 tracking-widest opacity-60">
                    <span>LINK DISTANCE</span>
                    <span id="distVal">110px</span>
                </div>
                <input type="range" id="linkDistance" min="50" max="200" value="110" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>

            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2 tracking-widest opacity-60">
                    <span>GRAVITY</span>
                    <span id="gravityVal">1.0x</span>
                </div>
                <input type="range" id="gravity" min="0.1" max="2.0" step="0.1" value="1.0" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>

            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2 tracking-widest opacity-60">
                    <span>BLAST RADIUS</span>
                    <span id="blastVal">500px</span>
                </div>
                <input type="range" id="blastRadius" min="200" max="800" step="50" value="500" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('luminaCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const fpsDisplay = document.getElementById('fps-monitor');

        // UI Elements
        const countSlider = document.getElementById('particleCount');
        const distSlider = document.getElementById('linkDistance');
        const gravitySlider = document.getElementById('gravity');
        const blastSlider = document.getElementById('blastRadius');

        let width, height, dpr;
        let particles = [];
        const cellSize = 80;
        let cols, rows;
        let grid = [];

        let config = {
            count: 200,
            linkDist: 110,
            gravity: 1.0,
            blastRadius: 500,
            damping: 0.94,
            safetyZone: 60
        };

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.z = Math.random() * 100;
                this.radius = 1.2 + (1 - this.z / 100) * 2.5;
                this.opacity = 0.2 + (1 - this.z / 100) * 0.6;
                this.hot = 0;
            }

            update(mx, my) {
                if (mx !== null) {
                    const dx = mx - this.x;
                    const dy = my - this.y;
                    const dSq = dx * dx + dy * dy;
                    const d = Math.sqrt(dSq);

                    if (d < 400) {
                        // 2. Soft-Body Physics & Orbiting
                        if (d > config.safetyZone) {
                            // Silk Inertia (Reduced acceleration)
                            const pull = (d - config.safetyZone) * 0.004 * config.gravity;
                            this.vx += (dx / d) * pull;
                            this.vy += (dy / d) * pull;
                        } else {
                            // Repulsion inside safety zone
                            const push = (config.safetyZone - d) * 0.01;
                            this.vx -= (dx / d) * push;
                            this.vy -= (dy / d) * push;
                        }

                        // Orbital Force
                        const angle = Math.atan2(dy, dx);
                        const orbit = 0.025 * config.gravity * (400 - d) / 400;
                        this.vx += Math.cos(angle + 1.57) * orbit;
                        this.vy += Math.sin(angle + 1.57) * orbit;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= config.damping;
                this.vy *= config.damping;

                if (this.hot > 0) this.hot -= 0.02;

                // 4. Boundary Wrap (Respawn)
                if (this.x < 0) this.x = width; else if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height; else if (this.y > height) this.y = 0;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, 6.28);
                ctx.fillStyle = this.hot > 0.1 ? `rgba(255, 255, 255, ${this.hot})` : `rgba(0, 242, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        let mouseX = null, mouseY = null;
        let lastTime = performance.now();
        let frames = 0;

        function resize() {
            dpr = Math.min(window.devicePixelRatio || 1, 2);
            width = canvas.width = window.innerWidth * dpr;
            height = canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            width /= dpr; height /= dpr;

            cols = Math.ceil(width / cellSize);
            rows = Math.ceil(height / cellSize);
            initParticles();
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < config.count; i++) {
                particles.push(new Particle());
            }
        }

        function loop() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, width, height);

            // Update Grid
            grid = Array.from({ length: cols * rows }, () => []);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                p.update(mouseX, mouseY);
                const c = Math.floor(p.x / cellSize);
                const r = Math.floor(p.y / cellSize);
                if (c >= 0 && c < cols && r >= 0 && r < rows) grid[r * cols + c].push(i);
            }

            ctx.globalCompositeOperation = 'lighter';
            const distSqLimit = config.linkDist * config.linkDist;

            // Plexus Connections (O(N) Spatial Partitioning)
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = grid[r * cols + c];
                    if (!cell.length) continue;

                    const neighbors = [[0,0], [1,0], [-1,1], [0,1], [1,1]];
                    for (let [ox, oy] of neighbors) {
                        const nc = c + ox, nr = r + oy;
                        if (nc < 0 || nc >= cols || nr >= rows) continue;
                        const nCell = grid[nr * cols + nc];

                        for (let i of cell) {
                            const p1 = particles[i];
                            for (let j of nCell) {
                                if (i === j) continue;
                                const p2 = particles[j];
                                const dx = p1.x - p2.x;
                                const dy = p1.y - p2.y;
                                const dSq = dx * dx + dy * dy;

                                if (dSq < distSqLimit) {
                                    const d = Math.sqrt(dSq);
                                    const alpha = (1 - d / config.linkDist) * 0.5;
                                    
                                    ctx.beginPath();
                                    ctx.moveTo(p1.x, p1.y);
                                    ctx.lineTo(p2.x, p2.y);
                                    
                                    if (p1.hot > 0.1 || p2.hot > 0.1) {
                                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 2})`;
                                    } else {
                                        const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                                        grad.addColorStop(0, `rgba(0, 242, 255, ${alpha})`);
                                        grad.addColorStop(1, `rgba(188, 19, 254, ${alpha})`);
                                        ctx.strokeStyle = grad;
                                    }
                                    ctx.lineWidth = (1 - d / config.linkDist) * 1.2;
                                    ctx.stroke();
                                }
                            }
                        }
                    }
                }
            }

            for (let p of particles) p.draw();
            ctx.globalCompositeOperation = 'source-over';

            // FPS
            frames++;
            const now = performance.now();
            if (now > lastTime + 1000) {
                fpsDisplay.innerText = `FPS: ${Math.round((frames * 1000) / (now - lastTime))}`;
                frames = 0; lastTime = now;
            }

            requestAnimationFrame(loop);
        }

        // 1. Precision Coordinate Mapping
        function handlePointer(e) {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        }

        // 5. Explicit Mousedown Event (Supernova)
        canvas.addEventListener('mousedown', (e) => {
            handlePointer(e);
            for (let p of particles) {
                const dx = p.x - mouseX;
                const dy = p.y - mouseY;
                const dSq = dx * dx + dy * dy;
                if (dSq < config.blastRadius * config.blastRadius) {
                    const d = Math.sqrt(dSq);
                    const force = (config.blastRadius - d) / 10;
                    p.vx += (dx / d) * force;
                    p.vy += (dy / d) * force;
                    p.hot = 1.0;
                }
            }
        });

        window.addEventListener('mousemove', handlePointer);
        window.addEventListener('resize', resize);

        // UI Listeners
        countSlider.addEventListener('input', (e) => {
            config.count = parseInt(e.target.value);
            document.getElementById('countVal').innerText = config.count;
            initParticles();
        });
        distSlider.addEventListener('input', (e) => {
            config.linkDist = parseInt(e.target.value);
            document.getElementById('distVal').innerText = config.linkDist + 'px';
        });
        gravitySlider.addEventListener('input', (e) => {
            config.gravity = parseFloat(e.target.value);
            document.getElementById('gravityVal').innerText = config.gravity.toFixed(1) + 'x';
        });
        blastSlider.addEventListener('input', (e) => {
            config.blastRadius = parseInt(e.target.value);
            document.getElementById('blastVal').innerText = config.blastRadius + 'px';
        });

        resize();
        loop();
    </script>
</body>
</html>
