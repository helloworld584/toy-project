<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina v2: Supernova Masterpiece (Extended)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020205; font-family: 'Inter', sans-serif; }
        canvas { display: block; touch-action: none; cursor: crosshair; width: 100vw; height: 100vh; }
        .glass-panel {
            background: rgba(10, 10, 20, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 10px 50px 0 rgba(0, 0, 0, 0.9);
            pointer-events: auto;
        }
        input[type=range] { accent-color: #00f2ff; }
        #fps-monitor {
            position: fixed; top: 10px; left: 10px; font-family: monospace; font-size: 10px;
            color: #00ff00; background: rgba(0, 0, 0, 0.5); padding: 2px 6px; border-radius: 4px;
            pointer-events: none; z-index: 100; opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- 
    [EXTENDED MASTERPIECE ENGINEERING LOG]
    1. Particle Capacity Expansion: Increased upper limit to 800 particles. 
       Maintains 60FPS via O(N) Spatial Partitioning.
    2. Connection Limiter: Added 'Max Connections' parameter to control visual density and CPU load.
    3. Precision Coordinate Mapping: Zero-offset mouse interaction via getBoundingClientRect().
    4. Anti-Clumping Physics: Inter-particle repulsion prevents clustering into a single point.
    5. Silk Inertia & Orbit: Fluid, organic motion with fine-tuned damping.
    -->
    <div id="fps-monitor">FPS: --</div>
    <canvas id="luminaCanvas"></canvas>

    <!-- UI Controller -->
    <div class="fixed bottom-8 right-8 w-80 glass-panel p-6 text-white select-none">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-black tracking-tighter bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">
                LUMINA V2
            </h2>
            <span class="text-[10px] px-2 py-1 rounded-full bg-cyan-500/20 text-cyan-400 font-bold border border-cyan-500/30 uppercase">Extended</span>
        </div>
        
        <div class="space-y-4">
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2 tracking-widest opacity-60">
                    <span>PARTICLE COUNT</span>
                    <span id="countVal">250</span>
                </div>
                <input type="range" id="particleCount" min="50" max="800" value="250" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>

            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2 tracking-widest opacity-60">
                    <span>MAX CONNECTIONS</span>
                    <span id="maxConnVal">4</span>
                </div>
                <input type="range" id="maxConnections" min="1" max="10" value="4" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>

            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2 tracking-widest opacity-60">
                    <span>LINK DISTANCE</span>
                    <span id="distVal">110px</span>
                </div>
                <input type="range" id="linkDistance" min="50" max="200" value="110" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>

            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2 tracking-widest opacity-60">
                    <span>GRAVITY</span>
                    <span id="gravityVal">1.0x</span>
                </div>
                <input type="range" id="gravity" min="0.1" max="2.0" step="0.1" value="1.0" class="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer">
            </div>

            <div class="pt-2 border-t border-white/5">
                <p class="text-[9px] opacity-40 leading-relaxed">
                    Extended: Up to 800 Particles & Dynamic Connection Limiter. <br>
                    Optimized: O(N) Spatial Hash Grid for High-Density Rendering.
                </p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('luminaCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const fpsDisplay = document.getElementById('fps-monitor');

        const countSlider = document.getElementById('particleCount');
        const maxConnSlider = document.getElementById('maxConnections');
        const distSlider = document.getElementById('linkDistance');
        const gravitySlider = document.getElementById('gravity');

        let width, height, dpr;
        let particles = [];
        const cellSize = 80;
        let cols, rows;
        let grid = [];

        let config = {
            count: 250,
            maxConnections: 4,
            linkDist: 110,
            gravity: 1.0,
            damping: 0.94,
            safetyZone: 60,
            repulsion: 0.5
        };

        class Particle {
            constructor() {
                this.init();
            }

            init() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.z = Math.random() * 100;
                this.radius = 1.2 + (1 - this.z / 100) * 2.5;
                this.opacity = 0.2 + (1 - this.z / 100) * 0.6;
                this.hot = 0;
                this.connections = 0;
            }

            update(mx, my, others) {
                if (mx !== null) {
                    const dx = mx - this.x;
                    const dy = my - this.y;
                    const dSq = dx * dx + dy * dy;
                    const d = Math.sqrt(dSq);

                    if (d < 400) {
                        if (d > config.safetyZone) {
                            const pull = (d - config.safetyZone) * 0.004 * config.gravity;
                            this.vx += (dx / d) * pull;
                            this.vy += (dy / d) * pull;
                        } else {
                            const push = (config.safetyZone - d) * 0.02;
                            this.vx -= (dx / d) * push;
                            this.vy -= (dy / d) * push;
                        }
                        const angle = Math.atan2(dy, dx);
                        const orbit = 0.025 * config.gravity * (400 - d) / 400;
                        this.vx += Math.cos(angle + 1.57) * orbit;
                        this.vy += Math.sin(angle + 1.57) * orbit;
                    }
                }

                for (let otherIdx of others) {
                    const p2 = particles[otherIdx];
                    if (p2 === this) continue;
                    const dx = p2.x - this.x;
                    const dy = p2.y - this.y;
                    const dSq = dx * dx + dy * dy;
                    const minDist = 15;
                    if (dSq < minDist * minDist && dSq > 0) {
                        const d = Math.sqrt(dSq);
                        const force = (minDist - d) * config.repulsion;
                        this.vx -= (dx / d) * force;
                        this.vy -= (dy / d) * force;
                    }
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= config.damping;
                this.vy *= config.damping;
                if (this.hot > 0) this.hot -= 0.02;
                if (this.x < 0) this.x = width; else if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height; else if (this.y > height) this.y = 0;
                
                this.connections = 0; // Reset for next frame
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, 6.28);
                ctx.fillStyle = this.hot > 0.1 ? `rgba(255, 255, 255, ${this.hot})` : `rgba(0, 242, 255, ${this.opacity})`;
                ctx.fill();
            }
        }

        let mouseX = null, mouseY = null;
        let lastTime = performance.now();
        let frames = 0;

        function resize() {
            dpr = window.devicePixelRatio || 1;
            const displayWidth = window.innerWidth;
            const displayHeight = window.innerHeight;
            canvas.width = displayWidth * dpr;
            canvas.height = displayHeight * dpr;
            canvas.style.width = displayWidth + 'px';
            canvas.style.height = displayHeight + 'px';
            ctx.scale(dpr, dpr);
            width = displayWidth;
            height = displayHeight;
            cols = Math.ceil(width / cellSize);
            rows = Math.ceil(height / cellSize);
            initParticles();
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < config.count; i++) {
                particles.push(new Particle());
            }
        }

        function loop() {
            ctx.fillStyle = '#020205';
            ctx.fillRect(0, 0, width, height);

            grid = Array.from({ length: cols * rows }, () => []);
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                const c = Math.floor(p.x / cellSize);
                const r = Math.floor(p.y / cellSize);
                if (c >= 0 && c < cols && r >= 0 && r < rows) grid[r * cols + c].push(i);
            }

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = grid[r * cols + c];
                    if (!cell.length) continue;
                    let neighbors = [];
                    for (let i = -1; i <= 1; i++) {
                        for (let j = -1; j <= 1; j++) {
                            const nc = c + i, nr = r + j;
                            if (nc >= 0 && nc < cols && nr >= 0 && nr < rows) neighbors = neighbors.concat(grid[nr * cols + nc]);
                        }
                    }
                    for (let i of cell) particles[i].update(mouseX, mouseY, neighbors);
                }
            }

            ctx.globalCompositeOperation = 'lighter';
            const distSqLimit = config.linkDist * config.linkDist;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = grid[r * cols + c];
                    if (!cell.length) continue;
                    const checkNeighbors = [[0,0], [1,0], [-1,1], [0,1], [1,1]];
                    for (let [ox, oy] of checkNeighbors) {
                        const nc = c + ox, nr = r + oy;
                        if (nc < 0 || nc >= cols || nr >= rows) continue;
                        const nCell = grid[nr * cols + nc];
                        for (let i of cell) {
                            const p1 = particles[i];
                            if (p1.connections >= config.maxConnections) continue;
                            for (let j of nCell) {
                                if (i === j) continue;
                                const p2 = particles[j];
                                if (p2.connections >= config.maxConnections) continue;
                                const dx = p1.x - p2.x;
                                const dy = p1.y - p2.y;
                                const dSq = dx * dx + dy * dy;
                                if (dSq < distSqLimit) {
                                    const d = Math.sqrt(dSq);
                                    const alpha = (1 - d / config.linkDist) * 0.5;
                                    ctx.beginPath();
                                    ctx.moveTo(p1.x, p1.y);
                                    ctx.lineTo(p2.x, p2.y);
                                    if (p1.hot > 0.1 || p2.hot > 0.1) {
                                        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 2})`;
                                    } else {
                                        const grad = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                                        grad.addColorStop(0, `rgba(0, 242, 255, ${alpha})`);
                                        grad.addColorStop(1, `rgba(188, 19, 254, ${alpha})`);
                                        ctx.strokeStyle = grad;
                                    }
                                    ctx.lineWidth = (1 - d / config.linkDist) * 1.2;
                                    ctx.stroke();
                                    p1.connections++;
                                    p2.connections++;
                                }
                            }
                        }
                    }
                }
            }

            for (let p of particles) p.draw();
            ctx.globalCompositeOperation = 'source-over';
            frames++;
            const now = performance.now();
            if (now > lastTime + 1000) {
                fpsDisplay.innerText = `FPS: ${Math.round((frames * 1000) / (now - lastTime))}`;
                frames = 0; lastTime = now;
            }
            requestAnimationFrame(loop);
        }

        function handlePointer(e) {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        }

        canvas.addEventListener('mousedown', (e) => {
            handlePointer(e);
            const blastRadius = 500;
            for (let p of particles) {
                const dx = p.x - mouseX;
                const dy = p.y - mouseY;
                const dSq = dx * dx + dy * dy;
                if (dSq < blastRadius * blastRadius) {
                    const d = Math.sqrt(dSq);
                    const force = (blastRadius - d) / 10;
                    p.vx += (dx / d) * force;
                    p.vy += (dy / d) * force;
                    p.hot = 1.0;
                }
            }
        });

        window.addEventListener('mousemove', handlePointer);
        window.addEventListener('resize', resize);

        countSlider.addEventListener('input', (e) => {
            config.count = parseInt(e.target.value);
            document.getElementById('countVal').innerText = config.count;
            initParticles();
        });
        maxConnSlider.addEventListener('input', (e) => {
            config.maxConnections = parseInt(e.target.value);
            document.getElementById('maxConnVal').innerText = config.maxConnections;
        });
        distSlider.addEventListener('input', (e) => {
            config.linkDist = parseInt(e.target.value);
            document.getElementById('distVal').innerText = config.linkDist + 'px';
        });
        gravitySlider.addEventListener('input', (e) => {
            config.gravity = parseFloat(e.target.value);
            document.getElementById('gravityVal').innerText = config.gravity.toFixed(1) + 'x';
        });

        resize();
        loop();
    </script>
</body>
</html>
